Transform: AWS::Serverless-2016-10-31
Resources:
  Auth:
    Type: AWS::Serverless::Api
    Properties:
      Name:
        Fn::Sub:
        - ${ResourceName} From Stack ${AWS::StackName}
        - ResourceName: Auth
      StageName: Prod
      DefinitionBody:
        openapi: '3.0'
        info: {}
        paths:
          /auth/signup:
            post:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri:
                  Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${Signup.Arn}/invocations
              responses: {}
          /auth/me:
            post:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri:
                  Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${me.Arn}/invocations
              responses: {}
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri:
                  Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${login.Arn}/invocations
              responses: {}
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      Cors:
        MaxAge: 5
  Signup:
    Type: AWS::Serverless::Function
    Properties:
      Description:
        Fn::Sub:
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: Signup
      CodeUri: Signup
      Handler: bootstrap
      Runtime: provided.al2023
      MemorySize: 128
      Timeout: 30
      Tracing: Active
      Events:
        AuthPOSTauthsignup:
          Type: Api
          Properties:
            Path: /auth/signup
            Method: POST
            RestApiId:
              Ref: Auth
      Architectures:
      - arm64
      Environment:
        Variables:
          USER_TABLE_NAME:
            Ref: User
          USER_TABLE_ARN:
            Fn::GetAtt:
            - User
            - Arn
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: User
    Metadata:
      BuildMethod: go1.x
      SamResourceId: Signup
  SignupLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${Signup}
  me:
    Type: AWS::Serverless::Function
    Properties:
      Description:
        Fn::Sub:
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: me
      CodeUri: me
      Runtime: provided.al2023
      MemorySize: 128
      Timeout: 30
      Tracing: Active
      Events:
        AuthPOSTauthme:
          Type: Api
          Properties:
            Path: /auth/me
            Method: POST
            RestApiId:
              Ref: Auth
      Architectures:
      - arm64
      Environment:
        Variables:
          USER_TABLE_NAME:
            Ref: User
          USER_TABLE_ARN:
            Fn::GetAtt:
            - User
            - Arn
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: User
      Handler: bootstrap
    Metadata:
      BuildMethod: go1.x
      SamResourceId: me
  meLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${me}
  User:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
  login:
    Type: AWS::Serverless::Function
    Properties:
      Description:
        Fn::Sub:
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: login
      CodeUri: login
      Runtime: provided.al2023
      MemorySize: 128
      Timeout: 30
      Tracing: Active
      Events:
        AuthGETauthme:
          Type: Api
          Properties:
            Path: /auth/me
            Method: GET
            RestApiId:
              Ref: Auth
      Environment:
        Variables:
          USER_TABLE_NAME:
            Ref: User
          USER_TABLE_ARN:
            Fn::GetAtt:
            - User
            - Arn
      Architectures:
      - arm64
      Handler: bootstrap
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: User
    Metadata:
      BuildMethod: go1.x
      SamResourceId: login
  loginLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${login}
