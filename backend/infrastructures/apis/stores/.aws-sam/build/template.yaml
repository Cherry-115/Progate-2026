Transform: AWS::Serverless-2016-10-31
Resources:
  Stores:
    Type: AWS::Serverless::Api
    Metadata:
      BuildMethod: go1.x
    Properties:
      Name:
        Fn::Sub:
        - ${ResourceName} From Stack ${AWS::StackName}
        - ResourceName: Stores
      StageName: Prod
      DefinitionBody:
        openapi: '3.0'
        info: {}
        paths:
          /stores:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri:
                  Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${stores.Arn}/invocations
              responses: {}
          /store/{storeid}:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri:
                  Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${store.Arn}/invocations
              responses: {}
          /store/{storeid}/inventorie:
            get:
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri:
                  Fn::Sub: arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${inventorie.Arn}/invocations
              responses: {}
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      Cors:
        MaxAge: 5
  stores:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
      SamResourceId: stores
    Properties:
      Description:
        Fn::Sub:
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: stores
      CodeUri: stores
      Runtime: provided.al2023
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Environment: {}
      Architectures:
      - arm64
      Handler: bootstrap
      Events:
        StoresGETstores:
          Type: Api
          Properties:
            Path: /stores
            Method: GET
            RestApiId:
              Ref: Stores
  storesLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${stores}
  store:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
      SamResourceId: store
    Properties:
      Description:
        Fn::Sub:
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: store
      CodeUri: store
      Runtime: provided.al2023
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Architectures:
      - arm64
      Handler: bootstrap
      Environment: {}
      Events:
        StoresGETstorestoreid:
          Type: Api
          Properties:
            Path: /store/{storeid}
            Method: GET
            RestApiId:
              Ref: Stores
  storeLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${store}
  inventorie:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: go1.x
      SamResourceId: inventorie
    Properties:
      Description:
        Fn::Sub:
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: inventorie
      CodeUri: inventorie
      Runtime: provided.al2023
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Architectures:
      - arm64
      Handler: bootstrap
      Environment: {}
      Events:
        StoresGETstorestoreidinventorie:
          Type: Api
          Properties:
            Path: /store/{storeid}/inventorie
            Method: GET
            RestApiId:
              Ref: Stores
  inventorieLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${inventorie}
Metadata:
  AWS::Composer::Groups:
    Group:
      Label: Group
      Members:
      - stores
      - store
      - inventorie
